<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=576, height=384">
    <title>Copa do Mundo 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            width: 576px;
            height: 384px;
            overflow: hidden;
            background: linear-gradient(135deg, #0a3d1f 0%, #1a6b3a 40%, #0d2818 100%);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.25), rgba(0, 0, 0, 0.3));
            border-bottom: 2px solid rgba(212, 175, 55, 0.6);
            flex-shrink: 0;
        }

        .titulo {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .titulo span {
            color: #d4af37;
        }

        .header-direita {
            text-align: right;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
        }

        #relogio {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        #data {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .conteudo {
            flex: 1;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .subtitulo {
            font-size: 12px;
            color: #d4af37;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .jogos-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .jogo-card {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            padding: 8px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .jogo-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .jogo-hora {
            font-size: 13px;
            font-weight: 700;
            color: #d4af37;
        }

        .jogo-status {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
        }

        .jogo-status.ao-vivo {
            background: #c0392b;
            animation: pulsar 1.5s ease-in-out infinite;
        }

        .jogo-status.encerrado {
            background: rgba(255, 255, 255, 0.2);
        }

        .jogo-status.aguardando {
            background: rgba(52, 152, 219, 0.5);
        }

        @keyframes pulsar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .placar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .time {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .time.visitante {
            flex-direction: row-reverse;
            text-align: right;
        }

        .time img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.8));
            flex-shrink: 0;
        }

        .time-nome {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .gols {
            font-size: 36px;
            font-weight: 900;
            min-width: 70px;
            text-align: center;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
            line-height: 1;
        }

        .jogo-info {
            font-size: 10px;
            text-align: center;
            opacity: 0.75;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sem-jogos {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
        }

        .sem-jogos .icone {
            font-size: 48px;
        }

        .sem-jogos .mensagem {
            font-size: 16px;
            font-weight: 700;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .sem-jogos .sub {
            font-size: 12px;
            opacity: 0.7;
        }

        .rodape {
            font-size: 9px;
            text-align: center;
            opacity: 0.5;
            padding: 4px;
            flex-shrink: 0;
        }

        .indicadores {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 2px 0;
        }

        .indicador {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: background 0.3s;
        }

        .indicador.ativo {
            background: #d4af37;
        }

        .slide-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grupos-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 5px;
            min-height: 0;
        }

        .grupo-mini {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 6px;
            padding: 4px 6px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .grupo-mini-titulo {
            font-size: 11px;
            font-weight: 900;
            color: #d4af37;
            text-align: center;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        .grupo-mini-linha {
            display: grid;
            grid-template-columns: 14px 18px 1fr 24px;
            gap: 3px;
            align-items: center;
            padding: 3px 2px;
            font-size: 10px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .grupo-mini-linha:last-child {
            border-bottom: none;
        }

        .grupo-mini-linha.classificado {
            background: rgba(129, 214, 172, 0.12);
            border-left: 2px solid #81D6AC;
            padding-left: 0;
        }

        .grupo-mini-linha img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .grupo-mini-pos {
            text-align: center;
            opacity: 0.75;
            font-size: 9px;
        }

        .grupo-mini-nome {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grupo-mini-pts {
            text-align: center;
            color: #d4af37;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="titulo">⚽ Copa do Mundo <span>2026</span></div>
        <div class="header-direita">
            <div id="relogio">--:--</div>
            <div id="data">--/--/----</div>
        </div>
    </div>

    <div class="conteudo">
        <div class="subtitulo" id="subtitulo">Jogos de Hoje</div>
        <div class="jogos-container" id="jogos-container">
            <div class="sem-jogos">
                <div class="icone">⚽</div>
                <div class="mensagem">Carregando jogos...</div>
            </div>
        </div>
        <div class="indicadores" id="indicadores"></div>
    </div>

    <div class="rodape" id="rodape">Atualizando...</div>

    <script type="application/json" id="jogos-dados">{{JOGOS_JSON}}</script>

    <script>
        const JOGOS_POR_PAGINA = 2;
        const GRUPOS_POR_PAGINA = 4;
        const INTERVALO_PLACARES = 30000;
        const INTERVALO_GRUPOS = 120000;
        const INTERVALO_CARROSSEL = 7000;
        const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

        const NOMES_PT = {
            'Mexico': 'México', 'South Africa': 'África do Sul', 'Brazil': 'Brasil',
            'Argentina': 'Argentina', 'Germany': 'Alemanha', 'France': 'França',
            'Spain': 'Espanha', 'Portugal': 'Portugal', 'England': 'Inglaterra',
            'United States': 'Estados Unidos', 'Canada': 'Canadá', 'Japan': 'Japão',
            'South Korea': 'Coreia do Sul', 'Netherlands': 'Holanda', 'Belgium': 'Bélgica',
            'Croatia': 'Croácia', 'Uruguay': 'Uruguai', 'Colombia': 'Colômbia',
            'Switzerland': 'Suíça', 'Morocco': 'Marrocos', 'Czechia': 'República Tcheca',
            'Czech Republic': 'República Tcheca', 'Italy': 'Itália', 'Norway': 'Noruega',
            'Ecuador': 'Equador', 'Mexico': 'México', 'Paraguay': 'Paraguai',
            'Denmark': 'Dinamarca', 'Poland': 'Polônia', 'Serbia': 'Sérvia',
            'Austria': 'Áustria', 'Turkey': 'Turquia', 'Wales': 'País de Gales',
            'Scotland': 'Escócia', 'Ukraine': 'Ucrânia', 'Iran': 'Irã',
            'Saudi Arabia': 'Arábia Saudita', 'Australia': 'Austrália', 'Qatar': 'Catar',
            'Ghana': 'Gana', 'Senegal': 'Senegal', 'Cameroon': 'Camarões',
            'Tunisia': 'Tunísia', 'Nigeria': 'Nigéria', 'Costa Rica': 'Costa Rica',
            'Panama': 'Panamá', 'Haiti': 'Haiti', 'Jamaica': 'Jamaica',
            'Korea Republic': 'Coreia do Sul',
        };

        let todosJogos = [];
        let todosGrupos = [];
        let slides = [];
        let slideAtual = 0;
        let ultimaAtualizacao = null;
        let slideTipoAtual = null;

        function traduzirNome(nome) {
            return NOMES_PT[nome] || nome;
        }

        function dataHojeBR() {
            return new Intl.DateTimeFormat('en-CA', {
                timeZone: 'America/Sao_Paulo',
                year: 'numeric', month: '2-digit', day: '2-digit',
            }).format(new Date()).replace(/-/g, '');
        }

        function statusEmPortugues(status) {
            const state = status.type?.state || 'pre';
            const descricao = status.type?.description || '';
            const relogio = status.displayClock || '';
            const detalhe = status.type?.shortDetail || '';
            let texto;

            if (state === 'in') {
                const descLower = descricao.toLowerCase();
                texto = descLower.includes('half') && !descLower.includes('full') ? 'Intervalo' : 'AO VIVO';
            } else if (state === 'post') {
                texto = 'Encerrado';
            } else {
                texto = 'Aguardando';
            }

            return { estado: state, texto, relogio, detalhe };
        }

        function parseEspnJogos(dados) {
            const jogos = [];

            for (const evento of dados.events || []) {
                const competicao = evento.competitions?.[0];
                if (!competicao) continue;

                let casa = null;
                let visitante = null;

                for (const c of competicao.competitors || []) {
                    const time = c.team || {};
                    const info = {
                        nome: traduzirNome(time.displayName || ''),
                        sigla: time.abbreviation || '',
                        logo: time.logo || '',
                        gols: c.score ?? '-',
                    };
                    if (c.homeAway === 'home') casa = info;
                    else visitante = info;
                }

                if (!casa || !visitante) continue;

                const dataJogo = new Date(competicao.date || evento.date);
                const hora = dataJogo.toLocaleTimeString('pt-BR', {
                    timeZone: 'America/Sao_Paulo',
                    hour: '2-digit', minute: '2-digit', hour12: false,
                });

                const venue = competicao.venue || {};
                const endereco = venue.address || {};

                jogos.push({
                    id: evento.id,
                    hora,
                    casa,
                    visitante,
                    status: statusEmPortugues(competicao.status || {}),
                    estadio: venue.fullName || '',
                    cidade: endereco.city || '',
                });
            }

            return jogos.sort((a, b) => a.hora.localeCompare(b.hora));
        }

        async function atualizarPlacaresAoVivo() {
            try {
                const resp = await fetch(`${ESPN_URL}?dates=${dataHojeBR()}`);
                if (!resp.ok) return;

                const dados = await resp.json();
                const jogosNovos = parseEspnJogos(dados);
                if (jogosNovos.length === 0) return;

                todosJogos = jogosNovos;
                ultimaAtualizacao = new Date().toISOString();

                const slideAnterior = slideAtual;
                montarSlides();
                slideAtual = Math.min(slideAnterior, slides.length - 1);

                if (slides[slideAtual]?.tipo === 'jogos') {
                    renderizarSlide();
                }

                const dt = new Date(ultimaAtualizacao);
                const h = String(dt.getHours()).padStart(2, '0');
                const m = String(dt.getMinutes()).padStart(2, '0');
                document.getElementById('rodape').textContent =
                    `Placares ao vivo · atualizado às ${h}:${m}`;
            } catch {}
        }

        function atualizarRelogio() {
            const agora = new Date();
            const hora = String(agora.getHours()).padStart(2, '0');
            const minuto = String(agora.getMinutes()).padStart(2, '0');
            const segundo = agora.getSeconds();
            const separador = segundo % 2 === 0 ? ':' : ' ';
            document.getElementById('relogio').textContent = `${hora}${separador}${minuto}`;

            const dias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            document.getElementById('data').textContent =
                `${dias[agora.getDay()]}, ${agora.getDate()} ${meses[agora.getMonth()]} ${agora.getFullYear()}`;
        }

        function classeStatus(status) {
            if (status.estado === 'in') return 'ao-vivo';
            if (status.estado === 'post') return 'encerrado';
            return 'aguardando';
        }

        function textoStatus(status) {
            if (status.estado === 'in') {
                return status.relogio ? `AO VIVO ${status.relogio}` : 'AO VIVO';
            }
            return status.texto;
        }

        function renderizarJogo(jogo) {
            const golsCasa = jogo.casa.gols ?? '-';
            const golsVisitante = jogo.visitante.gols ?? '-';
            const info = [jogo.estadio, jogo.cidade].filter(Boolean).join(' · ');

            return `
                <div class="jogo-card">
                    <div class="jogo-topo">
                        <span class="jogo-hora">${jogo.hora}</span>
                        <span class="jogo-status ${classeStatus(jogo.status)}">${textoStatus(jogo.status)}</span>
                    </div>
                    <div class="placar">
                        <div class="time casa">
                            <img src="${jogo.casa.logo}" alt="${jogo.casa.nome}" onerror="this.style.display='none'">
                            <span class="time-nome">${jogo.casa.nome}</span>
                        </div>
                        <div class="gols">${golsCasa} × ${golsVisitante}</div>
                        <div class="time visitante">
                            <img src="${jogo.visitante.logo}" alt="${jogo.visitante.nome}" onerror="this.style.display='none'">
                            <span class="time-nome">${jogo.visitante.nome}</span>
                        </div>
                    </div>
                    ${info ? `<div class="jogo-info">${info}</div>` : ''}
                </div>
            `;
        }

        function renderizarGrupoMini(grupo) {
            const linhas = grupo.times.map(time => `
                <div class="grupo-mini-linha ${time.classificado ? 'classificado' : ''}">
                    <span class="grupo-mini-pos">${time.posicao}</span>
                    <img src="${time.logo}" alt="${time.nome}" onerror="this.style.display='none'">
                    <span class="grupo-mini-nome">${time.nome}</span>
                    <span class="grupo-mini-pts">${time.pontos}</span>
                </div>
            `).join('');

            return `
                <div class="grupo-mini">
                    <div class="grupo-mini-titulo">${grupo.nome}</div>
                    ${linhas}
                </div>
            `;
        }

        function renderizarGruposPagina(grupos) {
            return `
                <div class="slide-area">
                    <div class="grupos-grid">
                        ${grupos.map(renderizarGrupoMini).join('')}
                    </div>
                </div>
            `;
        }

        function tituloGrupos(grupos) {
            const letras = grupos.map(g => g.letra);
            if (letras.length === 1) return `Grupo ${letras[0]}`;
            return `Grupos ${letras[0]}–${letras[letras.length - 1]}`;
        }

        function montarSlides() {
            slides = [];

            if (todosJogos.length === 0) {
                slides.push({ tipo: 'vazio' });
            } else {
                const totalPaginas = Math.ceil(todosJogos.length / JOGOS_POR_PAGINA);
                for (let i = 0; i < totalPaginas; i++) {
                    const inicio = i * JOGOS_POR_PAGINA;
                    slides.push({
                        tipo: 'jogos',
                        jogos: todosJogos.slice(inicio, inicio + JOGOS_POR_PAGINA),
                        pagina: i + 1,
                        totalPaginas,
                    });
                }
            }

            const totalPaginasGrupos = Math.ceil(todosGrupos.length / GRUPOS_POR_PAGINA);
            for (let i = 0; i < totalPaginasGrupos; i++) {
                const inicio = i * GRUPOS_POR_PAGINA;
                const gruposPagina = todosGrupos.slice(inicio, inicio + GRUPOS_POR_PAGINA);
                slides.push({
                    tipo: 'grupos',
                    grupos: gruposPagina,
                    pagina: i + 1,
                    totalPaginas: totalPaginasGrupos,
                });
            }
        }

        function aplicarDados(dados) {
            todosJogos = dados.jogos || [];
            todosGrupos = dados.grupos || [];
            ultimaAtualizacao = dados.atualizado_em;

            montarSlides();

            if (slideAtual >= slides.length) {
                slideAtual = 0;
            }

            renderizarSlide();

            if (ultimaAtualizacao) {
                const dt = new Date(ultimaAtualizacao);
                const h = String(dt.getHours()).padStart(2, '0');
                const m = String(dt.getMinutes()).padStart(2, '0');
                document.getElementById('rodape').textContent =
                    `Atualizado às ${h}:${m} · carrossel a cada 7s`;
            }
        }

        function renderizarSlide() {
            const container = document.getElementById('jogos-container');
            const indicadores = document.getElementById('indicadores');
            const subtitulo = document.getElementById('subtitulo');

            if (slides.length === 0) {
                container.innerHTML = `
                    <div class="sem-jogos">
                        <div class="icone">🏟️</div>
                        <div class="mensagem">Carregando...</div>
                    </div>
                `;
                indicadores.innerHTML = '';
                return;
            }

            const slide = slides[slideAtual];
            slideTipoAtual = slide.tipo;

            if (slide.tipo === 'jogos') {
                subtitulo.textContent = slide.totalPaginas > 1
                    ? `Jogos de Hoje (${slide.pagina}/${slide.totalPaginas})`
                    : `Jogos de Hoje — ${todosJogos.length} jogo${todosJogos.length !== 1 ? 's' : ''}`;
                container.innerHTML = `
                    <div class="slide-area jogos-container">
                        ${slide.jogos.map(renderizarJogo).join('')}
                    </div>
                `;
            } else if (slide.tipo === 'grupos') {
                const titulo = tituloGrupos(slide.grupos);
                subtitulo.textContent = slide.totalPaginas > 1
                    ? `Classificação — ${titulo} (${slide.pagina}/${slide.totalPaginas})`
                    : `Classificação — ${titulo}`;
                container.innerHTML = renderizarGruposPagina(slide.grupos);
            } else {
                subtitulo.textContent = 'Jogos de Hoje';
                container.innerHTML = `
                    <div class="sem-jogos">
                        <div class="icone">🏟️</div>
                        <div class="mensagem">Nenhum jogo hoje</div>
                        <div class="sub">Confira a classificação dos grupos</div>
                    </div>
                `;
            }

            if (slides.length > 1) {
                indicadores.innerHTML = slides.map((s, i) =>
                    `<div class="indicador ${i === slideAtual ? 'ativo' : ''}"></div>`
                ).join('');
            } else {
                indicadores.innerHTML = '';
            }
        }

        function proximoSlide() {
            if (slides.length > 1) {
                slideAtual = (slideAtual + 1) % slides.length;
                renderizarSlide();
            }
        }

        function lerDadosEmbutidos() {
            const el = document.getElementById('jogos-dados');
            if (!el) return null;
            try {
                return JSON.parse(el.textContent);
            } catch {
                return null;
            }
        }

        async function carregarDadosCompletos() {
            const emServidor = location.protocol === 'http:' || location.protocol === 'https:';

            if (emServidor) {
                try {
                    const resp = await fetch(`jogos.json?t=${Date.now()}`);
                    if (resp.ok) {
                        aplicarDados(await resp.json());
                        return true;
                    }
                } catch {}
            }

            const dados = lerDadosEmbutidos();
            if (dados) {
                aplicarDados(dados);
                return true;
            }

            return false;
        }

        async function iniciar() {
            const carregou = await carregarDadosCompletos();
            await atualizarPlacaresAoVivo();

            if (!carregou && !todosJogos.length) {
                document.getElementById('jogos-container').innerHTML = `
                    <div class="sem-jogos">
                        <div class="icone">⚠️</div>
                        <div class="mensagem">Erro ao carregar dados</div>
                        <div class="sub">Verifique sua conexão com a internet</div>
                    </div>
                `;
            }
        }

        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        iniciar();
        setInterval(atualizarPlacaresAoVivo, INTERVALO_PLACARES);
        setInterval(carregarDadosCompletos, INTERVALO_GRUPOS);
        setInterval(proximoSlide, INTERVALO_CARROSSEL);
    </script>
</body>
</html>
